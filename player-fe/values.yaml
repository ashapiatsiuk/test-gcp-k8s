ingress:
  className: gce
  host: player.my-cool.server
  tlsSecretName: ""
  gcp:
    # Optional global static IP name for GKE ingress.
    staticIpName: ""
    # Optional GKE ManagedCertificate name.
    managedCertificateName: ""
    # Optional pre-shared certificate name (GCE Ingress). Use this for self-signed certs.
    preSharedCertificateName: "player-fe-selfsigned"
  fe:
    annotations:
      kubernetes.io/ingress.allow-http: "false"
      kubernetes.io/ingress.class: "gce"

playerFe:
  enabled: true
  replicaCount: 1
  serviceAccountName: ""
  image:
    repository: nginx
    tag: "1.27"
    pullPolicy: IfNotPresent
  secretManager:
    enabled: true
    secretProviderClassName: player-fe-secrets
    projectNumber: "pilot-nebent"
    secretName: secret-file
    secretVersion: 1
    mountPath: /app/.env
    fileName: .env
  service:
    type: ClusterIP
    port: 80
    annotations:
      # Enable container-native load balancing for GKE ingress.
      cloud.google.com/neg: '{"ingress": true}'
  resources:
    requests:
      cpu: 250m
      memory: 512Mi
    limits:
      cpu: 500m
      memory: 1024Mi
  livenessProbe:
    httpGet:
      path: /
      port: 80
    initialDelaySeconds: 15
    periodSeconds: 20
  readinessProbe:
    httpGet:
      path: /
      port: 80
    initialDelaySeconds: 5
    periodSeconds: 10
  hpa:
    enabled: true
    minReplicas: 1
    maxReplicas: 1
    targetCPUUtilizationPercentage: 80
    targetMemoryUtilizationPercentage: 80
  ingress:
    enabled: true
    path: /
    pathType: Prefix
