ingress:
  className: nginx
  host: player.my-cool.server
  tlsSecretName: "player-fe-selfsigned"
  tlsExternalSecret:
    enabled: true
    secretStoreRef:
      kind: ClusterSecretStore
      name: gcp-secret-manager
    # GCP Secret Manager secret names and versions containing PEM values.
    remoteRefs:
      tlsCrt:
        key: player-fe-selfsigned-crt
        version: 1
      tlsKey:
        key: player-fe-selfsigned-key
        version: 1
  fe:
    annotations: {}

playerFe:
  enabled: true
  replicaCount: 1
  serviceAccountName: ""
  image:
    repository: nginx
    tag: "1.27"
    pullPolicy: IfNotPresent
  secretManager:
    enabled: true
    secretProviderClassName: player-fe-secrets
    projectNumber: "119263735347"
    secretName: my-secret-file
    secretVersion: 1
    mountPath: /app/.env
    fileName: env
  service:
    type: ClusterIP
    port: 80
    annotations: {}
  resources:
    requests:
      cpu: 250m
      memory: 512Mi
    limits:
      cpu: 500m
      memory: 1024Mi
  livenessProbe:
    httpGet:
      path: /
      port: 80
    initialDelaySeconds: 15
    periodSeconds: 20
  readinessProbe:
    httpGet:
      path: /
      port: 80
    initialDelaySeconds: 5
    periodSeconds: 10
  hpa:
    enabled: true
    minReplicas: 1
    maxReplicas: 1
    targetCPUUtilizationPercentage: 80
    targetMemoryUtilizationPercentage: 80
  ingress:
    enabled: true
    path: /
    pathType: Prefix
