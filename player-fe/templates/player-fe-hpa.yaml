{{- if and .Values.playerFe.enabled .Values.playerFe.hpa.enabled }}
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: player-fe
  labels:
    {{- include "player-fe.playerFe.labels" . | nindent 4 }}
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: player-fe
  minReplicas: {{ .Values.playerFe.hpa.minReplicas }}
  maxReplicas: {{ .Values.playerFe.hpa.maxReplicas }}
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: {{ .Values.playerFe.hpa.targetCPUUtilizationPercentage }}
    - type: Resource
      resource:
        name: memory
        target:
          type: Utilization
          averageUtilization: {{ .Values.playerFe.hpa.targetMemoryUtilizationPercentage }}
{{- end }}
