---
apiVersion: external-secrets.io/v1beta1
kind: SecretStore
metadata:
  name: gcp-store
spec:
  provider:
    gcpcm:
      projectID: "pilot-nebent"

---
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: ingress-tls-sync
spec:
  secretStoreRef:
    name: gcp-store
    kind: SecretStore
  target:
    name: player-fe-secret-tls
    template:
      type: kubernetes.io/tls
  data:
    - secretKey: tls.crt
      remoteRef:
        key: player-fe-selfsigned-crt
    - secretKey: tls.key
      remoteRef:
        key: player-fe-selfsigned-key