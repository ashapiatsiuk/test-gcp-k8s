{{- if and .Values.playerFe.enabled .Values.ingress.tlsExternalSecret.clusterSecretStore.enabled }}
{{- if not .Values.ingress.tlsExternalSecret.clusterSecretStore.projectID }}
{{- fail "ingress.tlsExternalSecret.clusterSecretStore.enabled=true requires ingress.tlsExternalSecret.clusterSecretStore.projectID" }}
{{- end }}
apiVersion: external-secrets.io/v1beta1
kind: ClusterSecretStore
metadata:
  name: {{ .Values.ingress.tlsExternalSecret.secretStoreRef.name }}
  labels:
    {{- include "player-fe.playerFe.labels" . | nindent 4 }}
spec:
  provider:
    gcpsm:
      projectID: {{ .Values.ingress.tlsExternalSecret.clusterSecretStore.projectID | quote }}
      {{- with .Values.ingress.tlsExternalSecret.clusterSecretStore.auth }}
      auth:
        {{- toYaml . | nindent 8 }}
      {{- end }}
{{- end }}
